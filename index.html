<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: #00ff41;
            font-family: 'Courier New', monospace;
        }
        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
        }
        .content {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .big-count {
            font-size: 9rem;
            font-weight: bold;
            padding: 20px 60px;
            border: 4px solid #00ff41;
            border-radius: 25px;
            background: rgba(0, 20, 0, 0.8);
            box-shadow: 0 0 60px #00ff41;
            text-shadow: 0 0 40px #00ff41;
            margin: 20px;
            min-width: 200px;
        }
        h1 {
            font-size: 3.8rem;
            margin: 20px;
            text-shadow: 0 0 30px #00ff41;
            letter-spacing: 5px;
        }
        .message {
            font-size: 2rem;
            max-width: 700px;
            margin-top: 40px;
            text-shadow: 0 0 20px #00ff41;
            opacity: 0;
            transition: opacity 2.5s;
        }
        .heart {
            position: absolute;
            font-size: 40px;
            color: #ff1493;
            pointer-events: none;
            z-index: 3;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh); opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="content">
        <h1>I LOVE YOU</h1>
        <div class="big-count" id="countdown">3</div>
        <div class="message" id="message">
            You are the reason I smile every day.<br>
            Thank you for being in my life! 💕
        </div>
    </div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワンABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        let columns = Math.floor(width / fontSize);
        let drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#00ff41';
            ctx.font = `${fontSize}px monospace`;

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (drops[i] * fontSize > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // 3-2-1 Countdown
        function startCountdown() {
            const countEl = document.getElementById('countdown');
            let count = 3;

            const timer = setInterval(() => {
                countEl.style.transition = 'all 0.4s';
                countEl.style.transform = 'scale(1.15)';
                
                setTimeout(() => {
                    countEl.style.transform = 'scale(1)';
                }, 200);

                if (count > 0) {
                    countEl.textContent = count;
                    count--;
                } else {
                    clearInterval(timer);
                    countEl.style.fontSize = '6rem';
                    countEl.textContent = "GO! ❤️";
                    
                    // Show message
                    setTimeout(() => {
                        document.getElementById('message').style.opacity = 1;
                    }, 800);
                }
            }, 1200);
        }

        // Falling Hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = ['❤️','💖','💗','💘'][Math.floor(Math.random()*4)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 5) + 's';
            heart.style.opacity = Math.random() * 0.6 + 0.7;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 9000);
        }

        // Initialize
        window.onload = () => {
            startCountdown();
            setInterval(createHeart, 250);
            for (let i = 0; i < 18; i++) {
                setTimeout(createHeart, i * 80);
            }
        };

        // Resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / fontSize);
            drops = Array(columns).fill(1);
        });
    </script>
</body>
</html>
