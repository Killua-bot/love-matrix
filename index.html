<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Kamu ❤️</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: #00ff41;
            font-family: 'Courier New', monospace;
        }
        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
        }
        .content {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 4.5rem;
            margin: 10px;
            text-shadow: 0 0 30px #00ff41;
            letter-spacing: 4px;
        }
        .countdown {
            font-size: 4.8rem;
            font-weight: bold;
            padding: 20px 40px;
            border: 3px solid #00ff41;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 40px #00ff41;
            margin: 30px 0;
            text-shadow: 0 0 20px #00ff41;
        }
        .message {
            font-size: 1.9rem;
            max-width: 800px;
            margin-top: 40px;
            text-shadow: 0 0 15px #00ff41;
            opacity: 0;
            transition: opacity 3s;
        }
        .heart {
            position: absolute;
            font-size: 35px;
            color: #ff1493;
            pointer-events: none;
            z-index: 3;
            animation: fall linear forwards;
            text-shadow: 0 0 15px #ff1493;
        }
        @keyframes fall {
            to { transform: translateY(110vh); opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="content">
        <h1>AKU SAYANG KAMU</h1>
        <div class="countdown" id="countdown">00 : 00 : 00 : 00</div>
        <div class="message" id="message">
            Kamu adalah alasan aku tersenyum setiap hari.<br>
            Terima kasih sudah ada di hidupku! 💕
        </div>
    </div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.07)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = `${fontSize}px monospace`;

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);

        // Countdown (Change the target date!)
        function startCountdown() {
            const target = new Date("2026-07-15T00:00:00").getTime(); // ← CHANGE THIS DATE
            const cd = document.getElementById('countdown');

            setInterval(() => {
                const now = new Date().getTime();
                let distance = target - now;

                if (distance < 0) {
                    cd.innerHTML = "I LOVE YOU ❤️";
                    return;
                }

                const days = Math.floor(distance / (1000*60*60*24));
                const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
                const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
                const seconds = Math.floor((distance % (1000*60)) / 1000);

                cd.innerHTML = `${days} : ${hours.toString().padStart(2,'0')} : ${minutes.toString().padStart(2,'0')} : ${seconds.toString().padStart(2,'0')}`;
            }, 1000);
        }

        // Falling Hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 4 + 4 + 's';
            heart.style.fontSize = Math.random() * 25 + 30 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 10000);
        }

        // Initialize
        window.onload = () => {
            startCountdown();
            setInterval(createHeart, 280);
            for (let i = 0; i < 12; i++) setTimeout(createHeart, i * 150);
            
            // Show message after 4 seconds
            setTimeout(() => {
                document.getElementById('message').style.opacity = 1;
            }, 4000);
        };

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
