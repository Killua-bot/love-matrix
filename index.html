<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Kamu ❤️</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            text-align: center;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
        .container {
            position: relative;
            z-index: 1;
            padding-top: 10vh;
        }
        h1 {
            font-size: 3rem;
            text-shadow: 0 0 20px #00ff00;
            margin: 20px;
        }
        .countdown {
            font-size: 2.5rem;
            margin: 30px auto;
            padding: 20px;
            border: 2px solid #00ff00;
            display: inline-block;
            border-radius: 15px;
            box-shadow: 0 0 30px #00ff00;
        }
        .message {
            font-size: 1.8rem;
            margin: 40px;
            opacity: 0;
            transition: opacity 2s;
        }
        .heart {
            position: absolute;
            color: #ff1493;
            font-size: 30px;
            pointer-events: none;
            z-index: 2;
            animation: fall linear forwards;
            text-shadow: 0 0 10px #ff1493;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="container">
        <h1>AKU SAYANG KAMU ❤️</h1>
        <div class="countdown" id="countdown">Loading...</div>
        <div class="message" id="message">
            Kamu adalah alasan aku tersenyum setiap hari.<br>
            Terima kasih sudah ada di hidupku! 💕
        </div>
    </div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        
        const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff00';
            ctx.font = `${fontSize}px monospace`;
            
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        
        setInterval(drawMatrix, 35);
        
        // Resize handler
        window.addEventListener('resize', () => {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        });
        
        // Countdown (example: 7 days from now - customize!)
        function startCountdown() {
            // Set your target date here (YYYY, MM-1, DD)
            const targetDate = new Date(2026, 6, 5).getTime(); // Example: July 5, 2026
            
            const countdownEl = document.getElementById('countdown');
            
            const interval = setInterval(() => {
                const now = new Date().getTime();
                const distance = targetDate - now;
                
                if (distance < 0) {
                    countdownEl.innerHTML = "WAKTU TELAH TIBA! ❤️";
                    clearInterval(interval);
                    return;
                }
                
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                
                countdownEl.innerHTML = `${days} : ${hours} : ${minutes} : ${seconds}`;
            }, 1000);
        }
        
        // Falling Hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['❤️', '💕', '💖', '💗'][Math.floor(Math.random() * 4)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.fontSize = (Math.random() * 25 + 20) + 'px';
            heart.style.opacity = Math.random() * 0.7 + 0.5;
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 8000);
        }
        
        // Reveal message after some time
        setTimeout(() => {
            document.getElementById('message').style.opacity = 1;
        }, 5000);
        
        // Start everything
        window.onload = () => {
            startCountdown();
            // Spawn hearts continuously
            setInterval(createHeart, 300);
            // Extra burst
            for (let i = 0; i < 15; i++) {
                setTimeout(createHeart, i * 100);
            }
        };
    </script>
</body>
</html>
