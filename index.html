<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; }
        canvas { display:block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        let particles = [];
        let fallingItems = [];

        const COLOR = '#ff1744';

        class Dot {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.targetX = this.x;
                this.targetY = this.y;
                this.size = 4.5;
            }
            update() {
                this.x += (this.targetX - this.x) * 0.085;
                this.y += (this.targetY - this.y) * 0.085;
            }
            draw() {
                ctx.fillStyle = COLOR;
                ctx.shadowBlur = 22;
                ctx.shadowColor = COLOR;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        class FallingItem {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * -h - 50;
                this.size = Math.random() * 22 + 18;
                this.speed = Math.random() * 3.5 + 2.2;
                this.swing = Math.random() * 0.8 + 0.4;
                this.swingSpeed = Math.random() * 0.04 + 0.02;
                this.angle = 0;
                
                if (Math.random() < 0.65) {
                    this.type = 'heart';
                    this.char = '❤️';
                } else {
                    this.type = 'letter';
                    const letters = ['I','L','O','V','E','U','Y','♥','♡'];
                    this.char = letters[Math.floor(Math.random() * letters.length)];
                }
            }
            update() {
                this.y += this.speed;
                this.angle += this.swingSpeed;
                this.x += Math.sin(this.angle) * this.swing;
                if (this.y > h + 50) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.sin(this.angle) * 0.2);
                ctx.font = `bold ${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 12;
                ctx.shadowColor = COLOR;
                ctx.fillStyle = this.type === 'heart' ? '#ff3366' : '#ff9999';
                ctx.fillText(this.char, 0, 0);
                ctx.restore();
            }
        }

        function createBigHeart() {
            particles = [];
            const cx = w/2;
            const cy = h/2 - 40;
            const scale = Math.min(w, h) * 0.42;
            
            for (let i = 0; i < 3200; i++) {
                const a = Math.random() * Math.PI * 2;
                const r = scale;
                const x = cx + r * (16 * Math.pow(Math.sin(a), 3)) / 17;
                const y = cy - r * (13 * Math.cos(a) - 5 * Math.cos(2*a) - 2 * Math.cos(3*a) - Math.cos(4*a)) / 17;
                
                const d = new Dot();
                d.targetX = x;
                d.targetY = y;
                particles.push(d);
            }
            
            const temp = document.createElement('canvas');
            const t = temp.getContext('2d');
            temp.width = w; 
            temp.height = h;
            t.font = 'bold 78px Arial';
            t.fillStyle = 'white';
            t.textAlign = 'center';
            t.textBaseline = 'middle';
            t.fillText("I LOVE YOU", cx, cy + 48);
            
            const data = t.getImageData(0, 0, w, h).data;
            for (let y = 0; y < h; y += 4) {
                for (let x = 0; x < w; x += 4) {
                    if (data[(y * w + x) * 4 + 3] > 100) {
                        const d = new Dot();
                        d.targetX = x;
                        d.targetY = y;
                        particles.push(d);
                    }
                }
            }
        }

        function createText(text, cx, cy, size = 180) {
            const temp = document.createElement('canvas');
            const t = temp.getContext('2d');
            temp.width = w; 
            temp.height = h;
            t.font = `bold ${size}px Arial`;
            t.fillStyle = COLOR;
            t.textAlign = 'center';
            t.textBaseline = 'middle';
            t.fillText(text, cx, cy);
            
            const data = t.getImageData(0, 0, w, h).data;
            particles = [];
            for (let y = 0; y < h; y += 5) {
                for (let x = 0; x < w; x += 5) {
                    if (data[(y * w + x) * 4 + 3] > 120) {
                        const d = new Dot();
                        d.targetX = x;
                        d.targetY = y;
                        particles.push(d);
                    }
                }
            }
        }

        function animate() {
            // Pure black background - no trails
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, w, h);
            
            // Falling items
            fallingItems.forEach(item => {
                item.update();
                item.draw();
            });
            
            // Main heart
            particles.forEach(p => { 
                p.update(); 
                p.draw(); 
            });
            
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            for (let i = 0; i < 65; i++) {
                fallingItems.push(new FallingItem());
            }
            
            animate();
            setTimeout(() => createText("3", w/2, h/2), 400);
            setTimeout(() => createText("2", w/2, h/2), 2500);
            setTimeout(() => createText("1", w/2, h/2), 4600);
            setTimeout(() => createBigHeart(), 6700);
        };

        window.addEventListener('resize', () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
